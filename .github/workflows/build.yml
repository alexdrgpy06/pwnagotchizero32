name: Build Pwnagotchi Zero

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      arch:
        type: choice
        description: Architecture
        options:
          - 32bit
          - 64bit
        default: 32bit
      release:
        type: boolean
        description: Create GitHub release
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-rust:
    name: Cross-compile Rust (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [32bit, 64bit]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == '32bit' && 'arm-unknown-linux-gnueabihf' || 'aarch64-unknown-linux-gnu' }}
      
      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
      
      - name: Setup Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ubuntu24.04-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu24.04-cargo-
      
      - name: Build
        working-directory: ./rust
        run: |
          # Cross-compile flags (linker + ARMv6 rustflags) come from the
          # committed .cargo/config.toml so they can't be lost.
          if [ "${{ matrix.arch }}" = "32bit" ]; then
            TARGET=arm-unknown-linux-gnueabihf
            export CC_arm_unknown_linux_gnueabihf=arm-linux-gnueabihf-gcc
            # C deps (e.g. mlua's Lua) must be ARMv6 too, or they SIGILL on Zero.
            export CFLAGS_arm_unknown_linux_gnueabihf="-march=armv6zk -mtune=arm1176jzf-s -mfpu=vfp -mfloat-abi=hard -marm"
          else
            TARGET=aarch64-unknown-linux-gnu
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          fi

          cargo build --release --target $TARGET

      - name: Verify 32-bit binary is ARMv6 (runs on original Pi Zero)
        if: matrix.arch == '32bit'
        run: |
          BIN=rust/target/arm-unknown-linux-gnueabihf/release/oxigotchi
          echo "== ARM attributes =="
          arm-linux-gnueabihf-readelf -A "$BIN" | grep -E "Tag_CPU_arch:|Tag_CPU_name:" || true
          if arm-linux-gnueabihf-readelf -A "$BIN" | grep -qiE "Tag_CPU_arch:\s*v7"; then
            echo "ERROR: 32-bit binary is ARMv7 — it will not run on the original Pi Zero/Zero W"
            exit 1
          fi
          echo "OK: 32-bit binary is not ARMv7"
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: oxigotchi-${{ matrix.arch }}
          path: rust/target/*/release/oxigotchi
          retention-days: 7

  build-image:
    name: Build SD Image (${{ matrix.arch }})
    needs: build-rust
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [32bit, 64bit]
    # The nexmon firmware build runs under qemu emulation and adds a good chunk
    # of time on top of the base pi-gen build.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: oxigotchi-${{ matrix.arch }}
          path: rust/target/
      
      - name: Make binary executable
        run: find rust/target -name oxigotchi -type f -exec chmod +x {} \;
      
      - name: Copy binary to stage3
        run: |
          mkdir -p stage3/05-install-oxigotchi/files/usr/local/bin
          find rust/target -name oxigotchi -type f -exec cp {} stage3/05-install-oxigotchi/files/usr/local/bin/oxigotchi \;
      
      - name: Set up QEMU binfmt for pi-gen
        run: |
          set -euxo pipefail
          # pi-gen runs the ARM chroot on this x86 runner and build-docker.sh gates on
          # `which qemu-arm` (shipped by qemu-user-binfmt). On Ubuntu that package
          # STRICTLY CONFLICTS with qemu-user-static, so apt refuses to install both.
          # Fix: install only qemu-user-static, register binfmt from it, and symlink the
          # binary name build-docker.sh looks for.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static binfmt-support
          # Register every qemu interpreter in binfmt_misc using F-flag *static* binaries
          # so emulation keeps working inside pi-gen's privileged build container.
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          # Satisfy build-docker.sh's `which qemu-arm` check without qemu-user-binfmt.
          sudo ln -sf /usr/bin/qemu-arm-static /usr/bin/qemu-arm
          # Sanity: prove the emulator resolves and the handler is present.
          which qemu-arm
          test -e /proc/sys/fs/binfmt_misc/qemu-arm
      
      - name: Build image with pi-gen (Docker)
        run: |
          # Pin to the bookworm (Debian 12) branch: nexmon firmware and the
          # pwnagotchi toolchain in stage3 target bookworm, not trixie.
          git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git pi-gen
          rsync -a --delete stage3/ pi-gen/stage3/
          cp config/config-${{ matrix.arch }} pi-gen/config
          echo "IMG_NAME=net-monitor-zero-${{ matrix.arch }}-${{ github.ref_name }}" >> pi-gen/config
          echo "DEPLOY_COMPRESSION=xz" >> pi-gen/config
          # Only stage3 exports an image; stop stock stage2 from also exporting a
          # "lite" image (saves an export and avoids two .img.xz files downstream).
          touch pi-gen/stage2/SKIP_IMAGES
          cd pi-gen
          ./build-docker.sh
          mkdir -p ../output
          cp deploy/*.img.xz ../output/ || true
      
      - name: Verify image
        run: |
          ls -la output/
          IMG=$(ls output/*.img.xz | head -1)
          if [ -z "$IMG" ]; then echo "No image produced"; exit 1; fi
          echo "Image: $IMG"
          sha256sum "$IMG" > "$IMG.sha256"
          cat "$IMG.sha256"
      
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: net-monitor-zero-${{ matrix.arch }}-${{ github.ref_name }}
          path: output/*.img.xz
          retention-days: 30

  release:
    name: Create Release
    needs: build-image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/net-monitor-zero-32bit-${{ github.ref_name }}/*.img.xz
            artifacts/net-monitor-zero-32bit-${{ github.ref_name }}/*.img.xz.sha256
            artifacts/net-monitor-zero-64bit-${{ github.ref_name }}/*.img.xz
            artifacts/net-monitor-zero-64bit-${{ github.ref_name }}/*.img.xz.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
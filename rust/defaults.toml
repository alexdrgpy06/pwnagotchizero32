# Default configuration for Pwnagotchi Zero
# This file provides all defaults - override via /etc/pwnagotchi/config.toml or conf.d/*.toml

[main]
name = "pwnagotchi-zero"
lang = "en"
iface = "wlan0mon"
mon_start_cmd = "/usr/bin/monstart"
mon_stop_cmd = "/usr/bin/monstop"
mon_max_blind_epochs = 5
no_restart = false
whitelist = []
confd = "/etc/pwnagotchi/conf.d/"
custom_plugin_repos = [
  "https://github.com/jayofelony/pwnagotchi-torch-plugins/archive/master.zip",
  "https://github.com/Sniffleupagus/pwnagotchi_plugins/archive/master.zip",
  "https://github.com/NeonLightning/pwny/archive/master.zip",
  "https://github.com/marbasec/UPSLite_Plugin_1_3/archive/master.zip",
  "https://github.com/wpa-2/Pwnagotchi-Plugins/archive/master.zip",
  "https://github.com/cyberartemio/wardriver-pwnagotchi-plugin/archive/main.zip",
]
custom_plugins = "/usr/local/share/pwnagotchi/custom-plugins/"

[main.plugins.auto-tune]
enabled = true

[main.plugins.auto_backup]
enabled = true
backup_location = "/etc/pwnagotchi/backups"

[main.plugins.auto-update]
enabled = true
install = true
interval = 1
token = ""

[main.plugins.bt-tether]
enabled = true
auto_reconnect = true
show_on_screen = true
show_mini_status = true
mini_status_position = [110, 0]
show_detailed_status = true
detailed_status_position = [0, 82]

[main.plugins.fix_services]
enabled = true

[main.plugins.cache]
enabled = true

[main.plugins.gpio_buttons]
enabled = false

[main.plugins.gps]
enabled = false
speed = 19200
device = "/dev/ttyUSB0"

[main.plugins.gps_listener]
enabled = false

[main.plugins.grid]
enabled = true
report = true

[main.plugins.logtail]
enabled = false
max_lines = 10000

[main.plugins.memtemp]
enabled = true
scale = "celsius"
orientation = "horizontal"

[main.plugins.ohcapi]
enabled = false
api_key = ""
receive_email = "yes"

[main.plugins.pwndroid]
enabled = false
gateway = ""
display = false
display_altitude = false

[main.plugins.pisugarx]
enabled = false
rotation = false
default_display = "percentage"
lowpower_shutdown = true
lowpower_shutdown_level = 10
max_charge_voltage_protection = false

[main.plugins.pwncrack]
enabled = true
key = ""

[main.plugins.session-stats]
enabled = true
save_directory = "/etc/pwnagotchi/sessions/"

[main.plugins.ups_hat_c]
enabled = false
label_on = true
shutdown = 5
bat_x_coord = 140
bat_y_coord = 0

[main.plugins.ups_lite]
enabled = false
shutdown = 2

[main.plugins.webcfg]
enabled = true

[main.plugins.pwnstore_ui]
enabled = true

[main.plugins.webgpsmap]
enabled = false

[main.plugins.wigle]
enabled = false
api_key = ""
cvs_dir = "/tmp"
donate = false
timeout = 30
position = [7, 85]

[main.plugins.wpa-sec]
enabled = true
api_key = ""
api_url = "https://wpa-sec.stanev.org"
download_results = true
show_pwd = false
single_files = false

[main.plugins.hashcat-sync]
enabled = true
remote_host = "hashcat.local"
remote_user = "hashcat"
remote_path = "/home/hashcat/captures"
local_path = "/etc/net-monitor/captures/"
sync_interval = 300
pull_potfile = true
potfile_path = "/home/hashcat/hashcat.potfile"
ssh_key = "/home/pi/.ssh/id_ed25519"

[main.log]
path = "/etc/pwnagotchi/log/pwnagotchi.log"
path_debug = "/etc/pwnagotchi/log/pwnagotchi-debug.log"

[main.log.rotation]
enabled = true
size = "10M"

[personality]
advertise = true
happy = ["(•‿‿•)", "(^‿‿^)", "(^◡◡^)"]
excited = ["(ᵔ◡◡ᵔ)", "(✜‿‿✜)"]
grateful = ["(^‿‿^)"]
motivated = ["(☼‿‿☼)", "(★‿★)", "(•̀ᴗ•́)"]
demotivated = ["(≖_≖)", "(￣ヘ￣)", "(¬_¬)"]
smart = ["(✜‿‿✜)"]
lonely = ["(ب_ب)", "(｡•́︿•̀｡)", "(︶︹︺)"]
sad = ["(╥☁╥ )", "(╥﹏╥)", "(ಥ﹏ಥ)"]
angry = ["(-_-')", "(⇀_⇀)", "(`___´)"]
friend = ["(♥‿‿♥)", "(♡‿‿♡)", "(♥‿♥ )", "(♥ω♥ )"]
broken = ["(☓‿‿☓)"]
debug = ["(#_#)"]
upload = ["(1_0)", "(1_1)", "(0_1)"]
png = true
position_x = 0
position_y = 16
frame_padding = true
frame_padding_min_bytes = 650
deauth = false
associate = false

[ui.web]
enabled = true
address = "::"
port = 8080
auth = false
username = "changeme"
password = "changeme"
origin = ""
on_frame = ""

[ui.web.theme]
accent_r = 76
accent_g = 175
accent_b = 80

[ui.display]
enabled = true
rotation = 180
type = "waveshare_v4"

[ui.faces]
png = true
position_x = 0
position_y = 16

[bettercap]
handshakes = "/etc/net-monitor/captures/"
silence = [
  "ble.device.new",
  "ble.device.lost",
  "ble.device.service.discovered",
  "ble.device.characteristic.discovered",
  "ble.device.disconnected",
  "ble.device.connected",
  "ble.connection.timeout",
  "wifi.client.new",
  "wifi.client.lost",
  "wifi.client.probe",
  "wifi.ap.new",
  "wifi.ap.lost",
  "mod.started"
]

[fs.memory]
enabled = true

[fs.memory.mounts.log]
enabled = true
mount = "/etc/pwnagotchi/log/"
size = "50M"
sync = 60
zram = true
rsync = true

[fs.memory.mounts.data]
enabled = true
mount = "/var/tmp/pwnagotchi"
size = "10M"
sync = 3600
zram = true
rsync = true

[oxigotchi]
bt_tether_enabled = true
bt_agent_enabled = true
phone_mac = ""
pisugar_i2c_addr = 0x24
pisugar_button_long_press = 3
pisugar_watchdog_interval = 30
wifi_recovery_enabled = true
wifi_recovery_gpio = 4
epoch_duration = 30
attack_rate_limit = 1
display_partial_refresh = true
# Force a full (de-ghosting) refresh every N epochs. 0 = never.
display_full_refresh_interval = 10
web_ui_enabled = true
display_dc_pin = 25
display_rst_pin = 17
display_busy_pin = 24